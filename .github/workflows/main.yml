name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: MarcondesKaua
          outputs: |
              dist/github-contribution-grid-snake.svg?color_snake=%23ff0000&color_dots=%23333,%23660000,%23990000,%23cc0000,%23ff0000
              dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=%23ff0000

      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
